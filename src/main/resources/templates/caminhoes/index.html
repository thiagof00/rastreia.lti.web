<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<body>
    <th:block th:fragment="content">

        <header class="topbar">
            <div class="topbar-left">
                <div class="page-title">Caminhões</div>
                <div class="breadcrumb"><i class="ti ti-chevron-right" style="font-size:14px"></i><span>Gerenciar</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="search-wrap"><i class="ti ti-search"></i><input class="search-input"
                        placeholder="Buscar por placa ou tipo..."></div>
                <button class="btn btn-primary" th:onclick="|window.location.href='@{/novo-caminhao}'|"><i
                        class="ti ti-plus"></i>
                    Cadastrar</button>
            </div>
        </header>
        <main class="content">
            <div class="stats-row cols-4">
                <div class="stat-card">
                    <div class="stat-icon si-purple"><i class="ti ti-steering-wheel"></i></div>
                    <div class="stat-body">
                        <div class="stat-value" style="color:var(--purple-500)">12</div>
                        <div class="stat-label">Total cadastrados</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon si-green"><i class="ti ti-circle-check"></i></div>
                    <div class="stat-body">
                        <div class="stat-value" style="color:var(--green-600)">4</div>
                        <div class="stat-label">Ociosos</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon si-amber"><i class="ti ti-route"></i></div>
                    <div class="stat-body">
                        <div class="stat-value" style="color:var(--amber-600)">6</div>
                        <div class="stat-label">Em viagem</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon si-blue"><i class="ti ti-tool"></i></div>
                    <div class="stat-body">
                        <div class="stat-value" style="color:var(--blue-600)">2</div>
                        <div class="stat-label">Em manutenção</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="ti ti-list"></i> Lista de caminhões</div>
                    <div class="card-actions">
                        <select class="filter-select">
                            <option>Todos os status</option>
                            <option>Ocioso</option>
                            <option>Em viagem</option>
                            <option>Em manutenção</option>
                        </select>
                        <select class="filter-select">
                            <option>Todos os tipos</option>
                            <option>Toco</option>
                            <option>Truck</option>
                            <option>Cavalo Mecânico</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th class="sortable">Placa</th>
                                <th>Tipo</th>
                                <th>Status</th>
                                <th>Em uso por</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="caminhao : ${caminhoes}">
                                <td th:text="${caminhao.id}" class="td-mono">#C01</td>
                                <td th:text="${caminhao.getPlaca()}" class="td-mono"
                                    style="font-weight:600;letter-spacing:1px">ABC-1234</td>
                                <td th:text="${caminhao.getModelo()}">Cavalo Mecânico 6×4</td>
                                <td><span class="badge badge-amber">Em viagem</span></td>
                                <td>Carga <span style="color:var(--purple-500);font-weight:500">#001</span></td>
                                <td>
                                    <div class="row-actions">
                                        <button class="row-btn edit" title="Editar"
                                            onclick="openModal('modal-caminhao-edit')"><i
                                                class="ti ti-edit"></i></button>
                                        <button class="row-btn del" title="Excluir"
                                            onclick="openModal('modal-delete-generic','caminhão ABC-1234')"><i
                                                class="ti ti-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- <div class="pagination">
                    <span class="pagination-info">Mostrando 1–5 de 12 registros</span>
                    <div class="pagination-btns">
                        <button class="page-btn" disabled><i class="ti ti-chevron-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn"><i class="ti ti-chevron-right"></i></button>
                    </div>
                </div> -->
            </div>
        </main>

    </th:block>
</body>

</html>
